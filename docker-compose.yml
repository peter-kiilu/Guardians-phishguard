version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phishguard-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    image: python:3.9-slim
    container_name: phishguard-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5500:5500"
    command: python -m http.server 5500
    restart: unless-stopped