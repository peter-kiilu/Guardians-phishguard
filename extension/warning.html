<!DOCTYPE html>
<html>
<head>
  <title>PhishGuard — Phishing Warning</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0a0a0f;
      color: #e0e0e8;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      max-width: 600px;
      padding: 40px;
    }
    .shield {
      font-size: 80px;
      margin-bottom: 20px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    h1 {
      font-size: 28px;
      color: #ff2244;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 10px;
      text-shadow: 0 0 20px rgba(255, 34, 68, 0.5);
    }
    .subtitle {
      color: #6a6a80;
      font-size: 14px;
      margin-bottom: 30px;
    }
    .details {
      background: rgba(255, 34, 68, 0.08);
      border: 1px solid rgba(255, 34, 68, 0.3);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 30px;
      text-align: left;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 34, 68, 0.1);
      font-size: 14px;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: #6a6a80; }
    .detail-value { color: #ff2244; font-weight: bold; }
    .detail-value.url {
      color: #e0e0e8;
      word-break: break-all;
      text-align: right;
      max-width: 350px;
    }
    .actions {
      display: flex;
      gap: 15px;
      justify-content: center;
    }
    .btn {
      padding: 12px 30px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      text-decoration: none;
    }
    .btn-back {
      background: #ff2244;
      color: white;
      border: none;
    }
    .btn-back:hover {
      background: #cc1a36;
      box-shadow: 0 0 20px rgba(255, 34, 68, 0.4);
    }
    .btn-proceed {
      background: transparent;
      color: #6a6a80;
      border: 1px solid #2a2a40;
    }
    .btn-proceed:hover {
      border-color: #6a6a80;
      color: #e0e0e8;
    }
    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: #3a3a50;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="shield">[!]</div>
    <h1>Phishing Site Detected</h1>
    <p class="subtitle">PhishGuard has blocked this page for your safety</p>

    <div class="details">
      <div class="detail-row">
        <span class="detail-label">Blocked URL</span>
        <span class="detail-value url" id="blocked-url">http://secure-login-verify-account.tk</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Risk Score</span>
        <span class="detail-value" id="risk-score">87.5%</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">ML Probability</span>
        <span class="detail-value" id="ml-prob">72.3%</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Heuristic Score</span>
        <span class="detail-value" id="h-score">+15</span>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-back" id="go-back">Go Back to Safety</button>
      <button class="btn btn-proceed" id="proceed">Proceed Anyway</button>
    </div>

    <p class="footer">PhishGuard v1.0 - ML-Powered Phishing Detection</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const blockedUrl = params.get('url') || 'Unknown';
    const confidence = params.get('confidence') || '—';
    const mlProb = params.get('ml_prob') || '—';
    const hScore = params.get('h_score') || '—';

    document.getElementById('blocked-url').textContent = blockedUrl;
    document.getElementById('risk-score').textContent = confidence + '%';
    document.getElementById('ml-prob').textContent = (parseFloat(mlProb) * 100).toFixed(1) + '%';
    document.getElementById('h-score').textContent = '+' + hScore;

    document.getElementById('go-back').addEventListener('click', () => {
      history.back();
    });

    document.getElementById('proceed').addEventListener('click', () => {
      // Navigate to the original URL, bypassing PhishGuard
      const url = params.get('url');
      if (url) {
        // Store in session so background.js knows to skip it
        chrome.storage.local.set({ ['bypass_' + url]: true }, () => {
          window.location.href = url;
        });
      }
    });
  </script>
</body>
</html>
