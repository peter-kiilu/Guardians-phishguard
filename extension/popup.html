<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 250px;
      padding: 15px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
    }
    .header img {
      width: 32px;
      height: 32px;
    }
    .header h2 {
      margin: 0;
      font-size: 18px;
      color: #d32f2f;
    }
    .status {
      padding: 10px;
      background-color: #f8f9fa;
      border-radius: 6px;
      border: 1px solid #e9ecef;
    }
    .status-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
      font-size: 13px;
    }
    .status-label {
      color: #6c757d;
    }
    .status-value {
      font-weight: bold;
      color: #28a745;
    }
    .footer {
      margin-top: 15px;
      font-size: 11px;
      color: #adb5bd;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="Logo">
    <h2>PhishGuard</h2>
  </div>
  <div class="status">
    <div class="status-item">
      <span class="status-label">Protection:</span>
      <span class="status-value" id="status-text">Active</span>
    </div>
    <div class="status-item">
      <span class="status-label">Backend:</span>
      <span class="status-value" id="backend-status">Checking...</span>
    </div>
  </div>
  <div class="footer">
    Real-time URL Analysis & ML Protection
  </div>
  <script src="popup.js"></script>
</body>
</html>
