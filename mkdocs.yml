site_name: PhishGuard Documentation
site_description: Comprehensive cybersecurity system for real-time phishing detection
repo_url: https://github.com/peter-kiilu/Guardians-phishguard
site_author: Team Guardians

theme:
  name: material
  palette:
    # Palette toggle light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - markdown.extensions.tables

nav:
  - Home: index.md
  - Setup Guide: setup.md
  - Backend API & ML:
      - Overview: backend/index.md
      - API Reference: backend/api.md
      - ML Pipeline: backend/ml-pipeline.md
  - Chrome Extension:
      - Overview: extension/index.md
      - URL Protection: extension/url-protection.md
      - Gmail Protection: extension/gmail-protection.md
  - Frontend Dashboard:
      - Cyberpunk UI: frontend/index.md
